// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function Kapital() {
  const [darkMode, setDarkMode] = useState(true);
  const C = darkMode ? DARK : LIGHT;

  const [screen, setScreen] = useState("home");
  const [courseSection, setCourseSection] = useState("macro");
  const [moduleView, setModuleView] = useState(null);
  const [moduleMode, setModuleMode] = useState("sheet");

  const [lesson, setLesson] = useState(null);
  const [step, setStep] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showExp, setShowExp] = useState(false);
  const [lives, setLives] = useState(3);
  const [answers, setAnswers] = useState([]);
  const [earnedXP, setEarnedXP] = useState(0);
  const [showContent, setShowContent] = useState(true);

  const [modStep, setModStep] = useState(0);
  const [modSelected, setModSelected] = useState(null);
  const [modShowExp, setModShowExp] = useState(false);
  const [modLives, setModLives] = useState(3);
  const [modAnswers, setModAnswers] = useState([]);

  const [stats, setStats] = useState({
    totalXP: 0, streak: 0, lessonsCompleted: 0,
    perfectLessons: 0, completedLessons: [],
    completedModules: [],
  });

  const [showSettings, setShowSettings] = useState(false);

  const resetProgress = () => {
    setStats({ totalXP: 0, streak: 0, lessonsCompleted: 0, perfectLessons: 0, completedLessons: [], completedModules: [] });
    setShowSettings(false);
  };

  const done = (id) => stats.completedLessons.includes(id);
  const moduleDone = (id) => (stats.completedModules || []).includes(id);

  const startLesson = (l) => {
    setLesson(l); setStep(0); setSelected(null); setShowExp(false);
    setLives(3); setAnswers([]); setEarnedXP(0); setShowContent(true);
    setScreen("lesson");
  };

  const startModule = (mod, mode) => {
    setModuleView(mod);
    setModuleMode(mode);
    if (mode === "quiz") {
      setModStep(0); setModSelected(null); setModShowExp(false);
      setModLives(3); setModAnswers([]);
    }
    setScreen("module");
  };

  const handleAnswer = (idx) => {
    if (showExp) return;
    setSelected(idx); setShowExp(true);
    const correct = idx === lesson.questions[step].answer;
    setAnswers((prev) => [...prev, correct]);
    if (!correct) setLives((l) => Math.max(0, l - 1));
  };

  const handleModAnswer = (idx) => {
    if (modShowExp) return;
    setModSelected(idx); setModShowExp(true);
    const correct = idx === moduleView.questions[modStep].answer;
    setModAnswers((prev) => [...prev, correct]);
    if (!correct) setModLives((l) => Math.max(0, l - 1));
  };

  const next = () => {
    const isLast = step + 1 >= lesson.questions.length;
    if (isLast) {
      const total = [...answers, selected === lesson.questions[step].answer].filter(Boolean).length;
      const xp = Math.round((total / lesson.questions.length) * lesson.xp);
      setEarnedXP(xp);
      setStats((prev) => ({
        ...prev, totalXP: prev.totalXP + xp,
        lessonsCompleted: done(lesson.id) ? prev.lessonsCompleted : prev.lessonsCompleted + 1,
        perfectLessons: total === lesson.questions.length ? prev.perfectLessons + 1 : prev.perfectLessons,
        completedLessons: done(lesson.id) ? prev.completedLessons : [...prev.completedLessons, lesson.id],
      }));
      setScreen("result");
    } else {
      setStep((s) => s + 1); setSelected(null); setShowExp(false);
    }
  };

  const nextMod = () => {
    const isLast = modStep + 1 >= moduleView.questions.length;
    if (isLast) {
      const total = [...modAnswers, modSelected === moduleView.questions[modStep].answer].filter(Boolean).length;
      const xp = Math.round((total / moduleView.questions.length) * 80);
      setStats((prev) => ({
        ...prev, totalXP: prev.totalXP + xp,
        perfectLessons: total === moduleView.questions.length ? prev.perfectLessons + 1 : prev.perfectLessons,
        completedModules: moduleDone(moduleView.id) ? prev.completedModules : [...(prev.completedModules || []), moduleView.id],
      }));
      setScreen("modresult");
    } else {
      setModStep((s) => s + 1); setModSelected(null); setModShowExp(false);
    }
  };

  const correctTotal = [...answers, selected === (lesson?.questions[step]?.answer)].filter(Boolean).length;
  const modCorrectTotal = [...modAnswers, modSelected === (moduleView?.questions[modStep]?.answer)].filter(Boolean).length;

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'DM Sans', 'Segoe UI', sans-serif" }}>

      {/* ── HOME ── */}
      {screen === "home" && (
        <div style={{ maxWidth: 440, margin: "0 auto", padding: "32px 20px 90px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 40 }}>
            <div>
              <div style={{ fontSize: "1.3rem", fontWeight: 700, letterSpacing: "-0.5px" }}>Kapital</div>
              <div style={{ fontSize: "0.73rem", color: C.textMuted, marginTop: 3 }}>Économie, un concept à la fois</div>
            </div>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <button onClick={() => setDarkMode(d => !d)} style={{
                background: C.surface, border: `1px solid ${C.border}`,
                borderRadius: 10, padding: "8px 12px", cursor: "pointer",
                fontSize: "0.75rem", color: C.blue, fontWeight: 600,
                fontFamily: "'DM Sans'", transition: "all 0.2s",
              }}>
                {darkMode ? "☀️ Clair" : "🌙 Sombre"}
              </button>
              <div onClick={() => setScreen("profile")} className="card-hover" style={{
                background: C.surface, border: `1px solid ${C.border}`,
                borderRadius: 12, padding: "10px 16px", textAlign: "right"
              }}>
                <div style={{ fontSize: "0.6rem", color: C.textMuted, fontWeight: 500, letterSpacing: 0.5 }}>XP</div>
                <div style={{ fontSize: "1rem", fontWeight: 700, color: C.gold, fontFamily: "'DM Mono'", marginTop: 1 }}>{stats.totalXP}</div>
              </div>
            </div>
          </div>

          <div style={{ fontSize: "0.65rem", fontWeight: 600, color: C.textMuted, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 14 }}>Cours complets</div>
          <div style={{ display: "flex", gap: 10, marginBottom: 28 }}>
            {[{ key: "macro", label: "Macro-économie", emoji: "🌍", color: "#1B4FD8", desc: "10 modules" }, { key: "micro", label: "Micro-économie", emoji: "🔬", color: "#0EA672", desc: "10 modules" }].map(c => (
              <div key={c.key} className="card-hover" onClick={() => { setCourseSection(c.key); setScreen("courses"); }} style={{
                flex: 1, background: C.surface, border: `1px solid ${C.border}`,
                borderRadius: 16, padding: "18px 14px", animation: "fadeUp 0.3s ease"
              }}>
                <div style={{ fontSize: "1.6rem", marginBottom: 10 }}>{c.emoji}</div>
                <div style={{ fontWeight: 700, fontSize: "0.85rem", marginBottom: 4 }}>{c.label}</div>
                <div style={{ fontSize: "0.7rem", color: C.textMuted }}>{c.desc}</div>
                <div style={{ marginTop: 10, fontSize: "0.65rem", color: c.color, fontWeight: 600 }}>Explorer →</div>
              </div>
            ))}
          </div>

          <div style={{ fontSize: "0.65rem", fontWeight: 600, color: C.textMuted, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 14 }}>Leçons rapides</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {[MACRO_MODULES.find(mod => !moduleDone(mod.id)), MICRO_MODULES.find(mod => !moduleDone(mod.id))].filter(Boolean).map((mod, i) => (
              <div key={mod.id} className="card-hover" onClick={() => startModule(mod, "sheet")} style={{
                background: C.surface, border: `1px solid ${C.border}`,
                borderRadius: 16, padding: "16px 18px",
                animation: `fadeUp ${0.2 + i * 0.07}s ease`,

              <span style={{ fontSize: "1rem" }}>{mod.emoji}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 500, fontSize: "0.78rem", marginBottom: 6 }}>{mod.title}</div>
                <div style={{ height: 3, background: C.border, borderRadius: 999 }}>
                  <div style={{ width: moduleDone(mod.id) ? "100%" : "0%", height: "100%", background: C.blue, borderRadius: 999, transition: "width 0.5s ease" }} />
                </div>
              </div>
              <span style={{ fontSize: "0.75rem", color: moduleDone(mod.id) ? C.success : C.textMuted }}>{moduleDone(mod.id) ? "✓" : "○"}</span>
            </div>
          ))}

          <div style={{ fontSize: "0.7rem", fontWeight: 600, color: C.success, marginTop: 18, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>🔬 Micro-économie</div>
          {MICRO_MODULES.map((mod) => (
            <div key={mod.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 13, padding: "13px 15px", marginBottom: 8, display: "flex", alignItems: "center", gap: 13 }}>
              <span style={{ fontSize: "1rem" }}>{mod.emoji}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 500, fontSize: "0.78rem", marginBottom: 6 }}>{mod.title}</div>
                <div style={{ height: 3, background: C.border, borderRadius: 999 }}>
                  <div style={{ width: moduleDone(mod.id) ? "100%" : "0%", height: "100%", background: C.success, borderRadius: 999, transition: "width 0.5s ease" }} />
                </div>
              </div>
              <span style={{ fontSize: "0.75rem", color: moduleDone(mod.id) ? C.success : C.textMuted }}>{moduleDone(mod.id) ? "✓" : "○"}</span>
            </div>
          ))}
          <BottomNav screen={screen} setScreen={setScreen} C={C} />
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Kapital />);
</script>
</body>
</html>
