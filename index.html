// ─── COMPONENTS ───────────────────────────────────────────────────────────────
function Block({ label, color, children, C }) {
  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 14, padding: "16px", marginBottom: 12 }}>
      <div style={{ fontSize: "0.65rem", fontWeight: 600, color, letterSpacing: 1, marginBottom: 8 }}>{label}</div>
      <p style={{ fontSize: "0.84rem", color: C.textSub, lineHeight: 1.7, margin: 0 }}>{children}</p>
    </div>
  );
}

function TopBar({ onBack, progress, total, lives, C }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 28 }}>
      <button onClick={onBack} style={{ background: "none", border: "none", color: C.textMuted, fontSize: "1.1rem", cursor: "pointer", padding: "4px 8px 4px 0", fontFamily: "'DM Sans'" }}>←</button>
      <div style={{ flex: 1, height: 3, background: C.border, borderRadius: 999 }}>
        <div style={{ width: `${(progress / total) * 100}%`, height: "100%", background: C.blue, borderRadius: 999, transition: "width 0.4s ease" }} />
      </div>
      <div style={{ display: "flex", gap: 3 }}>
        {[...Array(3)].map((_, i) => (
          <span key={i} style={{ fontSize: "0.85rem", opacity: i < lives ? 1 : 0.2, transition: "opacity 0.3s" }}>♥</span>
        ))}
      </div>
    </div>
  );
}

function BottomNav({ screen, setScreen, C }) {
  return (
    <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: C.bg, borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-around", padding: "14px 0 22px" }}>
      {[["Accueil", "home", "○"], ["Cours", "courses", "◈"], ["Profil", "profile", "◇"]].map(([label, s, icon]) => (
        <div key={s} onClick={() => setScreen(s)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 5, cursor: "pointer", opacity: screen === s ? 1 : 0.3, transition: "opacity 0.2s" }}>
          <span style={{ fontSize: "1rem", color: screen === s ? C.blue : C.textMuted }}>{icon}</span>
          <span style={{ fontSize: "0.62rem", fontWeight: 600, color: screen === s ? C.blue : C.textMuted, letterSpacing: 0.5 }}>{label}</span>
        </div>
      ))}
    </div>
  );
}

function btnStyle(color) {
  return { width: "100%", padding: "15px", borderRadius: 13, border: "none", background: color, color: "#fff", fontWeight: 600, fontSize: "0.9rem", cursor: "pointer", transition: "all 0.2s", fontFamily: "'DM Sans'" };
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function Kapital() {
  const [darkMode, setDarkMode] = useState(false);
  const C = darkMode ? DARK : LIGHT;

  const [screen, setScreen] = useState("home");
  const [courseSection, setCourseSection] = useState("macro");
  const [moduleView, setModuleView] = useState(null);
  const [moduleMode, setModuleMode] = useState("sheet");

  const [lesson, setLesson] = useState(null);
  const [step, setStep] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showExp, setShowExp] = useState(false);
  const [lives, setLives] = useState(3);
  const [answers, setAnswers] = useState([]);
  const [earnedXP, setEarnedXP] = useState(0);
  const [showContent, setShowContent] = useState(true);

  const [modStep, setModStep] = useState(0);
  const [modSelected, setModSelected] = useState(null);
  const [modShowExp, setModShowExp] = useState(false);
  const [modLives, setModLives] = useState(3);
  const [modAnswers, setModAnswers] = useState([]);
  const [earnedModXP, setEarnedModXP] = useState(0);

  const [stats, setStats] = useState({
    totalXP: 0, streak: 0, lessonsCompleted: 0,
    perfectLessons: 0, completedLessons: [],
    completedModules: [],
  });

  const [showSettings, setShowSettings] = useState(false);

  const resetProgress = () => {
    setStats({ totalXP: 0, streak: 0, lessonsCompleted: 0, perfectLessons: 0, completedLessons: [], completedModules: [] });
    setShowSettings(false);
  };

  const done = (id) => stats.completedLessons.includes(id);
  const moduleDone = (id) => (stats.completedModules || []).includes(id);

  const startLesson = (l) => {
    setLesson(l); setStep(0); setSelected(null); setShowExp(false);
    setLives(3); setAnswers([]); setEarnedXP(0); setShowContent(true);
    setScreen("lesson");
  };

  const startModule = (mod, mode) => {
    setModuleView(mod);
    setModuleMode(mode);
    if (mode === "quiz") {
      setModStep(0); setModSelected(null); setModShowExp(false);
      setModLives(3); setModAnswers([]);
    }
    setScreen("module");
  };

  const handleAnswer = (idx) => {
    if (showExp) return;
    setSelected(idx); setShowExp(true);
    const correct = idx === lesson.questions[step].answer;
    setAnswers((prev) => [...prev, correct]);
    if (!correct) setLives((l) => Math.max(0, l - 1));
  };

  const handleModAnswer = (idx) => {
    if (modShowExp) return;
    setModSelected(idx); setModShowExp(true);
    const correct = idx === moduleView.questions[modStep].answer;
    setModAnswers((prev) => [...prev, correct]);
    if (!correct) setModLives((l) => Math.max(0, l - 1));
  };

  const next = () => {
    const isLast = step + 1 >= lesson.questions.length;
    if (isLast) {
      const total = [...answers, selected === lesson.questions[step].answer].filter(Boolean).length;
      const xp = Math.round((total / lesson.questions.length) * lesson.xp);
      setEarnedXP(xp);
      setStats((prev) => ({
        ...prev, totalXP: prev.totalXP + xp,
        lessonsCompleted: done(lesson.id) ? prev.lessonsCompleted : prev.lessonsCompleted + 1,
        perfectLessons: total === lesson.questions.length ? prev.perfectLessons + 1 : prev.perfectLessons,
        completedLessons: done(lesson.id) ? prev.completedLessons : [...prev.completedLessons, lesson.id],
      }));
      setScreen("result");
    } else {
      setStep((s) => s + 1); setSelected(null); setShowExp(false);
    }
  };

  const nextMod = () => {
    const isLast = modStep + 1 >= moduleView.questions.length;
    if (isLast) {
      const total = modAnswers.filter(Boolean).length;
      const xp = Math.round((total / moduleView.questions.length) * 80);
      setEarnedModXP(xp);
      setStats((prev) => ({
        ...prev, totalXP: prev.totalXP + xp,
        perfectLessons: total === moduleView.questions.length ? prev.perfectLessons + 1 : prev.perfectLessons,
        completedModules: moduleDone(moduleView.id) ? prev.completedModules : [...(prev.completedModules || []), moduleView.id],
      }));
      setScreen("modresult");
    } else {
      setModStep((s) => s + 1); setModSelected(null); setModShowExp(false);
    }
  };

  const correctTotal = [...answers, selected === (lesson?.questions[step]?.answer)].filter(Boolean).length;
  const modCorrectTotal = modAnswers.filter(Boolean).length;

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'DM Sans', 'Segoe UI', sans-serif" }}>

      {/* ── HOME ── */}
      {screen === "home" && (
        <div style={{ maxWidth: 440, margin: "0 auto", padding: "32px 20px 90px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 40 }}>
            <div>
              <div style={{ fontSize: "1.3rem", fontWeight: 700, letterSpacing: "-0.5px" }}>Kapital</div>
              <div style={{ fontSize: "0.73rem", color: C.textMuted, marginTop: 3 }}>Économie, un concept à la fois</div>
            </div>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <button onClick={() => setDarkMode(d => !d)} style={{
                background: C.surface, border: `1px solid ${C.border}`,
                borderRadius: 10, padding: "8px 12px", cursor: "pointer",
                fontSize: "0.75rem", color: C.blue, fontWeight: 600,
                fontFamily: "'DM Sans'", transition: "all 0.2s",
              }}>
                {darkMode ? "☀️ Clair" : "🌙 Sombre"}
              </button>
              <div onClick={() => setScreen("profile")} className="card-hover" style={{
                background: C.surface, border: `1px solid ${C.border}`,

                    background: C.errorDim, border: `1px solid ${C.error}`,
                    color: C.error, fontWeight: 700, fontSize: "0.82rem",
                    cursor: "pointer", fontFamily: "'DM Sans'",
                  }}>🗑️ Réinitialiser toute la progression</button>
                </div>
              </div>
            </div>
          )}

          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 18, padding: "22px", marginBottom: 22 }}>
            <div style={{ fontSize: "0.63rem", fontWeight: 600, color: C.textMuted, letterSpacing: 1, marginBottom: 14 }}>STATISTIQUES</div>
            <div style={{ display: "flex" }}>
              {[
                { label: "XP total", value: stats.totalXP, mono: true, color: C.gold },
                { label: "Leçons", value: stats.lessonsCompleted },
                { label: "Modules", value: (stats.completedModules || []).length },
              ].map((s, i) => (
                <div key={s.label} style={{ flex: 1, textAlign: "center", borderLeft: i > 0 ? `1px solid ${C.border}` : "none", padding: "0 8px" }}>
                  <div style={{ fontSize: "1.1rem", fontWeight: 700, color: s.color || C.text, fontFamily: s.mono ? "'DM Mono'" : "inherit" }}>{s.value}</div>
                  <div style={{ fontSize: "0.6rem", color: C.textMuted, marginTop: 4 }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ fontSize: "0.65rem", fontWeight: 600, color: C.textMuted, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 12 }}>Succès</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 22 }}>
            {ACHIEVEMENTS.map((a) => {
              const unlocked = a.condition(stats);
              return (
                <div key={a.id} style={{ background: C.surface, border: `1px solid ${unlocked ? C.borderLight : C.border}`, borderRadius: 13, padding: "15px", opacity: unlocked ? 1 : 0.35 }}>
                  <div style={{ fontSize: "1.4rem", marginBottom: 8, filter: unlocked ? "none" : "grayscale(1)" }}>{a.emoji}</div>
                  <div style={{ fontWeight: 600, fontSize: "0.78rem" }}>{a.label}</div>
                  {unlocked && <div style={{ fontSize: "0.63rem", color: C.success, marginTop: 4, fontWeight: 600 }}>Débloqué</div>}
                </div>
              );
            })}
          </div>

          <div style={{ fontSize: "0.65rem", fontWeight: 600, color: C.textMuted, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 12 }}>Progression modules</div>

          <div style={{ fontSize: "0.7rem", fontWeight: 600, color: C.blue, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>🌍 Macro-économie</div>
          {MACRO_MODULES.map((mod) => (
            <div key={mod.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 13, padding: "13px 15px", marginBottom: 8, display: "flex", alignItems: "center", gap: 13 }}>
              <span style={{ fontSize: "1rem" }}>{mod.emoji}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 500, fontSize: "0.78rem", marginBottom: 6 }}>{mod.title}</div>
                <div style={{ height: 3, background: C.border, borderRadius: 999 }}>
                  <div style={{ width: moduleDone(mod.id) ? "100%" : "0%", height: "100%", background: C.blue, borderRadius: 999, transition: "width 0.5s ease" }} />
                </div>
              </div>
              <span style={{ fontSize: "0.75rem", color: moduleDone(mod.id) ? C.success : C.textMuted }}>{moduleDone(mod.id) ? "✓" : "○"}</span>
            </div>
          ))}

          <div style={{ fontSize: "0.7rem", fontWeight: 600, color: C.success, marginTop: 18, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>🔬 Micro-économie</div>
          {MICRO_MODULES.map((mod) => (
            <div key={mod.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 13, padding: "13px 15px", marginBottom: 8, display: "flex", alignItems: "center", gap: 13 }}>
              <span style={{ fontSize: "1rem" }}>{mod.emoji}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 500, fontSize: "0.78rem", marginBottom: 6 }}>{mod.title}</div>
                <div style={{ height: 3, background: C.border, borderRadius: 999 }}>
                  <div style={{ width: moduleDone(mod.id) ? "100%" : "0%", height: "100%", background: C.success, borderRadius: 999, transition: "width 0.5s ease" }} />
                </div>
              </div>
              <span style={{ fontSize: "0.75rem", color: moduleDone(mod.id) ? C.success : C.textMuted }}>{moduleDone(mod.id) ? "✓" : "○"}</span>
            </div>
          ))}

          <div style={{ fontSize: "0.7rem", fontWeight: 600, color: C.gold, marginTop: 18, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>⚡ Économie hétérodoxe</div>
          {HETERO_MODULES.map((mod) => (
            <div key={mod.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 13, padding: "13px 15px", marginBottom: 8, display: "flex", alignItems: "center", gap: 13 }}>
              <span style={{ fontSize: "1rem" }}>{mod.emoji}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 500, fontSize: "0.78rem", marginBottom: 6 }}>{mod.title}</div>
                <div style={{ height: 3, background: C.border, borderRadius: 999 }}>
                  <div style={{ width: moduleDone(mod.id) ? "100%" : "0%", height: "100%", background: C.gold, borderRadius: 999, transition: "width 0.5s ease" }} />
                </div>
              </div>
              <span style={{ fontSize: "0.75rem", color: moduleDone(mod.id) ? C.success : C.textMuted }}>{moduleDone(mod.id) ? "✓" : "○"}</span>
            </div>
          ))}
          <BottomNav screen={screen} setScreen={setScreen} C={C} />
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Kapital />);
</script>
</body>
</html>
